<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة SimpleDEX اللامركزية</title>
    <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js" type="text/javascript"></script>
    
    <style>
        :root {
            --primary: #2563eb;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
            --border: #334155;
            --success: #10b981;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .container { width: 100%; max-width: 550px; }
        header { display: flex; justify-content: space-between; align-items: center; width: 100%; max-width: 550px; margin-bottom: 20px; }
        .card { background-color: var(--card-bg); border: 1px solid var(--border); border-radius: 16px; padding: 20px; margin-bottom: 20px; }
        .btn { background-color: var(--primary); color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; }
        .btn-success { background-color: var(--success); }
        input, select { width: 100%; padding: 12px; background-color: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: white; margin-top: 8px; box-sizing: border-box; }
        #statusMessage { padding: 10px; border-radius: 8px; margin-top: 15px; text-align: center; display: none; font-size: 0.9rem; }
    </style>
</head>
<body>

    <header>
        <h1 style="color: #38bdf8;">SimpleDEX 🪙</h1>
        <button id="connectWalletBtn" class="btn" style="width: auto;" onclick="connectWallet()">ربط MetaMask</button>
    </header>

    <div class="container">
        <div id="walletInfo" class="card" style="display: none;">
            <div><strong>المحفظة:</strong> <span id="accountAddress" style="color:#38bdf8; font-size: 0.8rem;"></span></div>
        </div>

        <div class="card">
            <h2 style="margin-top:0; font-size: 1.2rem;">تبادل العملات (Swap)</h2>
            <label>من:</label>
            <input type="number" id="swapAmountIn" placeholder="0.0" oninput="updateEstimatedPrice()">
            <select id="tokenInSelect" onchange="updateEstimatedPrice()">
                <option value="TokenA">GoldToken (A)</option>
                <option value="TokenB">SilverToken (B)</option>
            </select>

            <label style="display:block; margin-top:15px;">إلى (تقديري):</label>
            <input type="number" id="swapAmountOut" placeholder="0.0" disabled>
            <button class="btn" style="margin-top:15px;" onclick="executeSwap()">تنفيذ التبادل</button>
        </div>

        <div class="card">
            <h2 style="margin-top:0; font-size: 1.2rem;">السيولة (Liquidity)</h2>
            <input type="number" id="amountA" placeholder="كمية GoldToken">
            <input type="number" id="amountB" placeholder="كمية SilverToken">
            <button class="btn btn-success" style="margin-top:15px;" onclick="executeAddLiquidity()">إيداع في المجمع</button>
        </div>

        <div id="statusMessage"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
